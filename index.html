<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gooseworx Archives</title>
    <style>
        :root {
            --bg-purple: #2c1a4d;
            --card-bg: #1a0f30;
            --text-main: #ffffff;
            --text-muted: #a291b5;
            --btn-blue: #0085ff;
            --btn-hover: #006acc;
            --border-color: #3d256a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-purple);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }

        /* Main Wrapper */
        .main-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-align: center;
        }

        /* Centered Horizontal Grid */
        .services-grid {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 24px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* Squircle Service Card Elements */
        .service-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px; /* Squircle appearance border radius */
            padding: 24px;
            width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
        }

        .service-icon {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 20px; /* Internal squircle rounding constraint */
            background-color: rgba(255, 255, 255, 0.05);
            margin-bottom: 14px;
        }

        .service-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .view-btn {
            display: inline-block;
            width: 100%;
            padding: 8px 0;
            background-color: var(--btn-blue);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 12px;
            transition: background-color 0.15s ease;
        }

        .view-btn:hover {
            background-color: var(--btn-hover);
        }

        /* Footer Layout Elements */
        footer {
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            width: 100%;
            max-width: 600px;
        }

        footer p {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        footer a {
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        footer a:hover {
            color: var(--text-main);
        }

        .status-msg {
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="main-content">
    <h1>The Gooseworx Archives</h1>
    
    <!-- Centered Horizontal Single-Row Grid Injection Point -->
    <main id="servicesContainer" class="services-grid">
        <div class="status-msg">Parsing list layout data...</div>
    </main>
</div>

<footer>
    <p>The Gooseworx Archives</p>
    <a href="https://github.com/gooseworx-archives" target="_blank">GitHub</a>
</footer>

<script>
    async function loadGooseList() {
        const container = document.getElementById('servicesContainer');
        try {
            const response = await fetch('list.gooselist');
            if (!response.ok) throw new Error("File not found");
            const rawText = await response.text();
            
            const services = parseGooseList(rawText);
            
            if (services.length === 0) {
                container.innerHTML = `<div class="status-msg">No entries found inside target configuration file.</div>`;
                return;
            }
            
            container.innerHTML = ''; // Clear status message
            
            services.forEach(service => {
                const card = document.createElement('div');
                card.className = 'service-card';
                
                // Construct fallback handling for full-url or relative structures dynamically
                const targetUrl = service.fullUrl || service.relativeUrl || '#';
                const iconPath = service.icon || '';
                
                card.innerHTML = `
                    <img src="${iconPath}" alt="${service.name}" class="service-icon" onerror="this.style.backgroundColor='rgba(255,255,255,0.1)'">
                    <div class="service-name">${service.name || 'Unknown'}</div>
                    <a href="${targetUrl}" class="view-btn">View</a>
                `;
                container.appendChild(card);
            });
            
        } catch (error) {
            container.innerHTML = `<div class="status-msg" style="color: #ff4a4a;">Error loading list.gooselist framework file.</div>`;
        }
    }

    // Custom Tokenizer Parser for .gooselist syntax structure blocks
    function parseGooseList(text) {
        const lines = text.split('\n');
        const items = [];
        let currentItem = null;
        let insideStart = false;

        for (let line of lines) {
            line = line.trim();
            
            if (line === 'start') {
                insideStart = true;
                currentItem = {};
                continue;
            }
            
            if (line === 'end' && insideStart) {
                insideStart = false;
                if (currentItem && (currentItem.name || currentItem.relativeUrl || currentItem.fullUrl)) {
                    items.push(currentItem);
                }
                currentItem = null;
                continue;
            }

            if (line === '-file-end') {
                break;
            }

            if (insideStart && currentItem) {
                // Handle extraction rules matching parameter string groupings: -key "value"
                const matches = line.match(/^-([a-zA-Z0-9\-]+)\s+"([^"]+)"/);
                if (matches) {
                    const key = matches[1];
                    const value = matches[2];
                    
                    if (key === 'name') currentItem.name = value;
                    else if (key === 'relative-url') currentItem.relativeUrl = value;
                    else if (key === 'full-url') currentItem.fullUrl = value;
                    else if (key === 'icon') currentItem.icon = value;
                }
            }
        }
        return items;
    }

    window.addEventListener('DOMContentLoaded', loadGooseList);
</script>
</body>
</html>
